<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Session Chat — Mason</title>
  <style>
    /* Windows 95 / archaic corporate styling to match Mason Admin */
    :root {
      --win-bg: #c0c0c0;
      --win-face: #c0c0c0;
      --win-highlight: #ffffff;
      --win-light: #dfdfdf;
      --win-shadow: #808080;
      --win-darkshadow: #404040;
      --win-title: #000080;
      --win-title-text: #ffffff;
      --win-text: #000000;
      --win-muted: #404040;
      --win-border-width: 2px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
      font-size: 11px;
      color: var(--win-text);
      background: var(--win-bg);
      min-height: 100vh;
      padding: 12px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 12px;
      background: var(--win-face);
      border: var(--win-border-width) outset var(--win-light);
      border-color: var(--win-highlight) var(--win-shadow) var(--win-shadow) var(--win-highlight);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: var(--win-border-width) solid var(--win-shadow);
    }
    .header h1 {
      margin: 0 0 4px 0;
      font-size: 14px;
      font-weight: bold;
    }
    .meta {
      color: var(--win-muted);
      font-size: 11px;
    }
    .messages {
      list-style: none;
      padding: 0;
      margin: 12px 0;
      display: grid;
      gap: 8px;
      max-height: 480px;
      overflow: auto;
      border: var(--win-border-width) inset var(--win-shadow);
      background: var(--win-highlight);
      padding: 8px;
    }
    .msg {
      padding: 8px 10px;
      border: 1px solid var(--win-shadow);
      background: var(--win-face);
    }
    .msg.admin {
      background: #d0d0ff;
      border-color: var(--win-title);
    }
    .msg .meta {
      font-size: 10px;
      margin-bottom: 4px;
    }
    .form {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }
    .form input[type="text"] {
      flex: 1;
      padding: 6px 8px;
      border: var(--win-border-width) inset var(--win-shadow);
      border-color: var(--win-shadow) var(--win-highlight) var(--win-highlight) var(--win-shadow);
      background: var(--win-highlight);
      font-family: inherit;
      font-size: 11px;
    }
    .form button {
      padding: 6px 14px;
      border: var(--win-border-width) outset var(--win-light);
      border-color: var(--win-highlight) var(--win-shadow) var(--win-shadow) var(--win-highlight);
      background: var(--win-face);
      color: var(--win-text);
      font-weight: bold;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
    }
    .form button:hover {
      border-color: var(--win-highlight) var(--win-shadow) var(--win-shadow) var(--win-highlight);
    }
    .form button:active {
      border-style: inset;
      border-color: var(--win-shadow) var(--win-highlight) var(--win-highlight) var(--win-shadow);
    }
    .form button.ghost {
      background: var(--win-face);
      border: var(--win-border-width) outset var(--win-light);
    }
    #notice {
      margin-top: 8px;
      min-height: 1em;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="header">
      <div>
        <h1>Session chat</h1>
        <div id="sessionMeta" class="meta"></div>
      </div>
      <div class="meta" id="chatStatus"></div>
    </div>
    <div id="notice" class="meta"></div>
    <ul id="messages" class="messages"></ul>
    <form id="chatForm" class="form">
      <input id="chatInput" type="text" placeholder="Write a message..." />
      <button type="submit">Send</button>
      <button id="startChatBtn" type="button" class="ghost" style="display:none">Start chat</button>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="sessionchat.js"></script>
</body>
</html>
